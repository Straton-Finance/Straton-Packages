name: Publish Packages

on:
  push:
    tags: ['v*']
  workflow_dispatch: # manual re-trigger from any ref (e.g., re-publish after CI fix)

jobs:
  publish:
    name: Publish to npmjs.com (OIDC Trusted Publishing)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for npm OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Use npm >= 11.5.1 (required for trusted publishing)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: "Pack tarballs (resolves workspace: protocol)"
        run: |
          mkdir -p dist-tarballs
          for dir in packages/*/; do
            ( cd "$dir" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/dist-tarballs" )
          done

      - name: Publish to npmjs.com
        # NOTE: the "./" prefix is REQUIRED — without it, npm interprets
        # "dist-tarballs/foo.tgz" as a GitHub shorthand (user/repo) and tries
        # `git ls-remote` instead of treating it as a tarball file path.
        run: |
          for tgz in dist-tarballs/*.tgz; do
            echo "Publishing ./$tgz"
            npm publish "./$tgz" --access public
          done
